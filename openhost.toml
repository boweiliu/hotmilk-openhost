[app]
name = "hotmilk"
version = "0.1.0"
description = "Tabbed web terminals preloaded with Pi coding agent and hotmilk meta-package, for building and debugging openhost apps."

[runtime.container]
image = "Dockerfile"
port = 5000

[routing]
health_check = "/health"

[resources]
memory_mb = 1024
cpu_millicores = 1000

# Persistent home directory survives redeploys, so pi config, shell history,
# etc. all stick around across updates.
[data]
app_data = true

# Fetch OPENROUTER_API_KEY from the secrets app if it's installed. The fetch is
# best-effort — if secrets-v2 isn't around or the key isn't set, the terminal
# still works and the user can export the key by hand.
[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/secrets"
shortname = "secrets"
version = ">=0.1.0"
grants = [
    {key = "OPENROUTER_API_KEY"},
]